[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Mount a persistent volume at /data so the SQLite database,
# uploaded photos, and all user data survive redeploys.
# In Railway dashboard: add a Volume, set mount path to /data
[[volumes]]
mount = "/data"

version: "3.8"

services:
  mazarine:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - PORT=${PORT:-8000}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MAZARINE_DB_PATH=/data/mazarine.db
    volumes:
      - mazarine-data:/data
      - mazarine-uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8000}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mazarine-data:
  mazarine-uploads:
